
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SIGPPC</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

    <!-- MENU -->
    <aside class="sidebar">

        <div class="logo">
            <h1>SIGPPC</h1>
            <span>Sistema de Gestão de PPC</span>
        </div>

        <nav>

            <button class="menu-item active" data-page="dashboard">
                📊 Dashboard
            </button>

            <button class="menu-item" data-page="ppcs">
                📄 PPCs
            </button>

            <button class="menu-item" data-page="modelos">
                📁 Modelos
            </button>

            <button class="menu-item" data-page="bases">
                ⚖ Bases Legais
            </button>

            <button class="menu-item" data-page="relatorios">
                📈 Relatórios
            </button>

        </nav>

    </aside>

    <!-- CONTEÚDO -->
    <main class="content">

        <!-- DASHBOARD -->
        <section id="dashboard" class="page active">

            <h2>Dashboard</h2>

            <div class="cards">

                <div class="card">
                    <span>PPCs</span>
                    <h3 id="totalPPC">0</h3>
                </div>

                <div class="card">
                    <span>Modelos</span>
                    <h3 id="totalModelos">0</h3>
                </div>

                <div class="card">
                    <span>Versões</span>
                    <h3 id="totalVersoes">0</h3>
                </div>

                <div class="card">
                    <span>Bases Legais</span>
                    <h3 id="totalBases">0</h3>
                </div>

            </div>

        </section>

        <!-- PPCs -->
        <section id="ppcs" class="page">

            <div class="page-header">

                <h2>PPCs</h2>

                <button id="novoPPC">
                    + Novo PPC
                </button>

            </div>

            <div id="listaPPCs">

            </div>

        </section>

        <!-- MODELOS -->
        <section id="modelos" class="page">

            <h2>Modelos de PPC</h2>

            <div class="box">

                Em desenvolvimento.

            </div>

        </section>

        <!-- BASES -->
        <section id="bases" class="page">

            <h2>Bases Legais</h2>

            <div class="box">

                Em desenvolvimento.

            </div>

        </section>

        <!-- RELATÓRIOS -->
        <section id="relatorios" class="page">

            <h2>Relatórios</h2>

            <div class="box">

                Em desenvolvimento.

            </div>

        </section>

    </main>

</div>

<!-- Modal -->

<div id="modal" class="modal hidden">

    <div class="modal-content">

        <h2>Novo PPC</h2>

        <input
            id="nomePPC"
            type="text"
            placeholder="Nome do PPC">

        <div class="acoes">

            <button id="salvarPPC">
                Salvar
            </button>

            <button id="cancelarModal">
                Cancelar
            </button>

        </div>

    </div>

</div>

<script src="app.js"></script>

</body>

</html>
